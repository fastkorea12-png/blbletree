<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>바이블트리 · 집중 묵상 시안</title>
<style>
  :root {
    --ink: #1d2622; --ink-soft: #5a675f; --paper: #f3f6f2; --card: #ffffff; --line: #dde5de;
    --green: #2f8a4c; --green-bg: #e9f4ec;
    --blue: #3565c9; --blue-bg: #e8eefb;
    --purple: #7143b8; --purple-bg: #f0eafa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #e6ece8; --ink-soft: #9fada5; --paper: #10150f; --card: #1a211a; --line: #2b362f;
      --green: #5cb87a; --green-bg: #1c2b21;
      --blue: #7da3f0; --blue-bg: #1b2333;
      --purple: #a98be0; --purple-bg: #251d33;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    line-height: 1.7; -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .wrap { max-width: 430px; width: 100%; }
  .logo { font-size: 40px; text-align: center; margin: 0 0 6px; }
  h1 { font-size: 24px; font-weight: 800; text-align: center; margin: 0 0 4px; letter-spacing: -0.02em; }
  .sub { text-align: center; color: var(--ink-soft); font-size: 14px; margin: 0 0 28px; }
  a.card {
    display: block; background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 18px 20px; margin-bottom: 12px; text-decoration: none; color: var(--ink);
    transition: transform .15s, box-shadow .15s; border-left: 5px solid var(--line);
  }
  a.card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(20, 40, 25, .08); }
  a.card:focus-visible { outline: 2.5px solid var(--ink-soft); outline-offset: 2px; }
  .chip { display: inline-block; font-size: 12px; font-weight: 800; padding: 2px 10px; border-radius: 999px; margin-bottom: 6px; }
  .t { font-size: 17px; font-weight: 800; margin: 0; }
  .r { font-size: 13.5px; color: var(--ink-soft); margin: 2px 0 0; }
  .youth { border-left-color: var(--blue); } .youth .chip { background: var(--blue-bg); color: var(--blue); }
  .young { border-left-color: var(--purple); } .young .chip { background: var(--purple-bg); color: var(--purple); }
  .high { border-left-color: var(--green); } .high .chip { background: var(--green-bg); color: var(--green); }
  .records { border-left-color: #8a6d3b; } .records .chip { background: #f1e8d4; color: #8a6d3b; }
  @media (prefers-color-scheme: dark) { .records { border-left-color: #c9a86a; } .records .chip { background: #2e2717; color: #c9a86a; } }
  .pending {
    background: transparent; border: 1.5px dashed var(--line); border-radius: 16px;
    padding: 16px 20px; color: var(--ink-soft); font-size: 13.5px; text-align: center; margin-bottom: 12px;
  }
  .foot { text-align: center; font-size: 12px; color: var(--ink-soft); margin-top: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <p class="logo">🌳</p>
  <h1>바이블트리 집중 묵상</h1>
  <p class="sub">2026년 7월 17일 · 고후 1:3–7<br>연령을 선택하세요 — 인터랙티브 시안입니다</p>

  <a class="card youth" href="youth.html">
    <span class="chip">청소년</span>
    <p class="t">위로하시는 하나님</p>
    <p class="r">단계형 집중 묵상 · ~해요체</p>
  </a>

  <a class="card young" href="young.html">
    <span class="chip">청년</span>
    <p class="t">위로의 원천</p>
    <p class="r">단계형 집중 묵상 · ~습니다체</p>
  </a>

  <div class="pending">저학년 · 고학년은 다른 방향의 시안을 준비 중이에요 ✏️</div>

  <a class="card high" href="high.html">
    <span class="chip">고학년</span>
    <p class="t">위로의 하나님 <span style="font-weight:400;font-size:13px;color:var(--ink-soft)">(초기 시안 · 참고용)</span></p>
    <p class="r">청소년·청년 버전의 원형이 된 첫 시안</p>
  </a>

  <a class="card records" href="records.html">
    <span class="chip">기록</span>
    <p class="t">나의 묵상 기록 📖</p>
    <p class="r">저장한 기록을 다시 읽는 서재 모드 시안</p>
  </a>

  <p class="foot">Bibletree × HEM — 큐티 상세 페이지 리뉴얼 목업</p>
</div>
</body>
</html>
