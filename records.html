<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>바이블트리 · 나의 묵상 기록 (서재 모드 시안)</title>
</head>
<body>
<style>
  /* 쓰기 모드(집중 묵상)와 달리, 다시 읽는 서재 모드는 종이·세리프 톤 */
  :root {
    --paper: #f6f1e6;
    --card: #fffdf6;
    --ink: #3b3325;
    --ink-soft: #8b7f6a;
    --line: #e7ddc8;
    --sepia: #8a6d3b;
    --sepia-deep: #6b5228;
    --sepia-bg: #f1e8d4;
    --fruit: #c2803d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #1b160e; --card: #241e13; --ink: #ece3d0; --ink-soft: #a3967c;
      --line: #3a3220; --sepia: #c9a86a; --sepia-deep: #dfc491; --sepia-bg: #2e2717; --fruit: #d9964f;
    }
  }
  :root[data-theme="dark"] {
    --paper: #1b160e; --card: #241e13; --ink: #ece3d0; --ink-soft: #a3967c;
    --line: #3a3220; --sepia: #c9a86a; --sepia-deep: #dfc491; --sepia-bg: #2e2717; --fruit: #d9964f;
  }
  :root[data-theme="light"] {
    --paper: #f6f1e6; --card: #fffdf6; --ink: #3b3325; --ink-soft: #8b7f6a;
    --line: #e7ddc8; --sepia: #8a6d3b; --sepia-deep: #6b5228; --sepia-bg: #f1e8d4; --fruit: #c2803d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: "Noto Serif KR", "Apple Myungjo", "Nanum Myeongjo", Georgia, serif;
    line-height: 1.85; -webkit-font-smoothing: antialiased;
    word-break: keep-all; overflow-wrap: break-word;
  }
  .ui { font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif; }
  .note {
    max-width: 430px; margin: 18px auto 0; padding: 0 20px;
    font-size: 12.5px; color: var(--ink-soft); text-align: center;
    font-family: "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif;
  }
  .phone {
    max-width: 430px; margin: 10px auto 60px; background: var(--card);
    border: 1px solid var(--line); border-radius: 22px; overflow: hidden;
    min-height: 720px; display: flex; flex-direction: column;
    box-shadow: 0 12px 40px rgba(60, 45, 20, .10);
  }
  .screen { display: none; flex: 1; flex-direction: column; padding: 26px 24px 30px; animation: fadein .45s ease; }
  .screen.on { display: flex; }
  @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .screen { animation: none; } }

  /* ── 아카이브 ── */
  .eyebrow {
    font-size: 11.5px; letter-spacing: .18em; font-weight: 700; color: var(--sepia);
    text-transform: uppercase; margin: 0 0 6px;
    font-family: "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif;
  }
  h1 { font-size: 25px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 2px; line-height: 1.35; }
  .sub { color: var(--ink-soft); font-size: 13.5px; margin: 0 0 22px; }

  .recall {
    display: block; width: 100%; text-align: left; cursor: pointer;
    background: var(--sepia-bg); border: none; border-radius: 14px;
    padding: 14px 16px; margin: 0 0 18px; color: var(--ink); font: inherit; line-height: 1.75;
  }
  .recall .lbl { font-size: 11.5px; font-weight: 700; letter-spacing: .1em; color: var(--sepia); margin-bottom: 2px; }
  .recall .tt { font-size: 15px; font-weight: 700; }
  .recall .rf { font-size: 12.5px; color: var(--ink-soft); }

  .treecard { border: 1px solid var(--line); border-radius: 16px; padding: 18px 18px 14px; margin-bottom: 22px; }
  .treehead { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .treehead .m { font-size: 15.5px; font-weight: 700; }
  .treehead .c { font-size: 12.5px; color: var(--ink-soft); }
  .treehead .c b { color: var(--fruit); font-weight: 700; }
  .cal { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .cal th { font-size: 10.5px; font-weight: 600; color: var(--ink-soft); padding: 2px 0 6px; text-align: center; }
  .cal td { text-align: center; padding: 3px 0; font-size: 12px; color: var(--ink-soft); }
  .cal .d { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; }
  .cal button.d { border: none; background: var(--sepia-bg); cursor: pointer; font-size: 15px; padding: 0; }
  .cal button.d:hover { transform: scale(1.1); }
  .cal .today { box-shadow: inset 0 0 0 1.5px var(--sepia); }
  .cal .num { opacity: .55; }

  .tl-label { font-size: 12px; letter-spacing: .14em; font-weight: 700; color: var(--sepia); margin: 0 0 10px; text-transform: uppercase; }
  .tl { border-top: 1px solid var(--line); }
  .item {
    display: grid; grid-template-columns: 52px 1fr; gap: 14px; width: 100%; text-align: left;
    padding: 15px 2px; border: none; border-bottom: 1px solid var(--line); background: transparent;
    cursor: pointer; color: var(--ink); font: inherit; line-height: 1.7; align-items: start;
  }
  .item:hover { background: var(--sepia-bg); }
  .item .date { text-align: center; padding-top: 2px; }
  .item .date .dd { font-size: 19px; font-weight: 700; color: var(--sepia); line-height: 1.2; }
  .item .date .wd { font-size: 11px; color: var(--ink-soft); }
  .item .tt { font-size: 15.5px; font-weight: 700; margin: 0; }
  .item .rf { font-size: 12px; color: var(--ink-soft); margin: 0 0 3px; }
  .item .pv { font-size: 13.5px; color: var(--ink-soft); margin: 0; font-style: normal; }
  .item .pv::before { content: "“"; color: var(--sepia); }
  .item .pv::after { content: "”"; color: var(--sepia); }

  /* ── 하루 상세 ── */
  .back {
    align-self: flex-start; background: transparent; border: none; cursor: pointer;
    color: var(--ink-soft); font-size: 13.5px; padding: 0 0 18px; font-family: inherit;
  }
  .back:hover { color: var(--sepia); }
  .d-date { font-size: 12.5px; letter-spacing: .12em; color: var(--sepia); margin: 0 0 6px; font-weight: 700;
    font-family: "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif; }
  .d-title { font-size: 24px; font-weight: 700; margin: 0 0 2px; line-height: 1.4; text-wrap: balance; }
  .d-ref { font-size: 13.5px; color: var(--ink-soft); margin: 0 0 20px; }
  .versebox {
    background: var(--sepia-bg); border-radius: 14px; padding: 16px 18px;
    font-size: 14px; line-height: 2.0; margin: 0 0 26px; color: var(--ink);
  }
  .versebox .vn { color: var(--sepia); font-size: 11.5px; font-weight: 700; margin-right: 4px; }
  .qa { margin-bottom: 24px; }
  .qa .q {
    font-size: 12.5px; font-weight: 700; color: var(--sepia); margin: 0 0 6px; line-height: 1.6;
    font-family: "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif;
  }
  .qa .a { font-size: 16px; margin: 0; padding-left: 14px; border-left: 2.5px solid var(--line); }
  .praybox { margin: 4px 0 0; padding-top: 20px; border-top: 1px solid var(--line); }
  .praybox .lbl { font-size: 12px; letter-spacing: .14em; font-weight: 700; color: var(--sepia); margin: 0 0 8px; text-transform: uppercase;
    font-family: "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif; }
  .praybox .p { font-size: 15.5px; margin: 0; }
  .d-foot { text-align: center; color: var(--ink-soft); font-size: 12.5px; margin-top: 34px; }
  .grow { flex: 1; }

  /* ── 가로모드 ── */
  @media (orientation: landscape) and (max-height: 640px) {
    .note { max-width: 760px; }
    .phone { max-width: 760px; min-height: calc(100svh - 70px); margin: 8px auto 30px; }
    .screen { padding: 18px 32px 22px; }
  }
</style>

<p class="note">인터랙티브 시안 — 저장한 묵상 기록을 다시 읽는 "서재 모드"입니다. 열매나 목록을 눌러보세요. (예시 데이터)</p>

<div class="phone">

  <!-- 아카이브: 월간 나무 + 타임라인 -->
  <section class="screen on" id="archive">
    <p class="eyebrow">나의 서재</p>
    <h1>묵상 기록</h1>

    <div class="treecard">
      <div class="treehead ui">

  </section>

  <!-- 하루 상세: 단계 없이 한 페이지로 다시 읽기 -->
  <section class="screen" id="detail">
    <button type="button" class="back" id="backBtn">← 기록으로 돌아가기</button>
    <p class="d-date" id="dDate"></p>
    <h1 class="d-title" id="dTitle"></h1>
    <p class="d-ref" id="dRef"></p>
    <div class="versebox" id="dVerse"></div>
    <div id="dQa"></div>
    <div class="praybox">
      <p class="lbl">이날의 기도</p>
      <p class="p" id="dPray"></p>
    </div>
    <div class="grow"></div>
    <p class="d-foot" id="dFoot"></p>
  </section>

</div>

    ref: '시편 46:1–3', verse: '<span class="vn">1</span>하나님은 우리의 피난처시요 힘이시니 환난 중에 만날 큰 도움이시라',
    qa: [
      { q: '피난처라는 말이 나에게 와닿는 이유는 무엇인가요?', a: '고등학교 올라와서 모든 게 낯설었는데, 도망갈 곳이 있다는 말이 그날 참 위로가 됐다.' }
    ],
    pray: '흔들리는 순간마다 주님께로 피하게 해 주세요. 아멘.'
  };

  var archive = document.getElementById('archive');
  var detail = document.getElementById('detail');

  function showDetail(r, footText) {
    document.getElementById('dDate').textContent = r.date;
    document.getElementById('dTitle').textContent = r.title;
    document.getElementById('dRef').textContent = r.ref;
    document.getElementById('dVerse').innerHTML = r.verse;
    var qaHtml = '';
    r.qa.forEach(function (x) {
      qaHtml += '<div class="qa"><p class="q">' + x.q + '</p><p class="a">' + x.a + '</p></div>';
    });
    document.getElementById('dQa').innerHTML = qaHtml;
    document.getElementById('dPray').textContent = '"' + r.pray + '"';
    document.getElementById('dFoot').textContent = footText;
    archive.classList.remove('on');
    detail.classList.add('on');
    window.scrollTo(0, 0);
  }
  document.getElementById('backBtn').addEventListener('click', function () {
    detail.classList.remove('on');
    archive.classList.add('on');
  });
  document.getElementById('recallBtn').addEventListener('click', function () {
    showDetail(lastyear, '1년 전 오늘의 기록이에요 🕰');
  });

  /* 달력: 2026년 7월 (1일 = 수요일) */
  var cal = document.getElementById('cal');
  var html = '<tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr><tr>';
  var col = 0;
  for (; col < 3; col++) html += '<td></td>';
  for (var d = 1; d <= 31; d++) {
    if (records[d]) {
      html += '<td><button type="button" class="d" data-day="' + d + '" aria-label="7월 ' + d + '일 기록 보기">🍎</button></td>';
    } else {
      html += '<td><span class="d num' + (d === 17 ? ' today' : '') + '">' + d + '</span></td>';
    }
    col++;
    if (col % 7 === 0 && d < 31) html += '</tr><tr>';
  }
  html += '</tr>';
  cal.innerHTML = html;
  cal.addEventListener('click', function (e) {
    var b = e.target.closest('button[data-day]');
    if (b) showDetail(records[+b.dataset.day], '이날 나무에 열매가 맺혔어요 🍎');
  });

  /* 타임라인 (최신순) */
  var tl = document.getElementById('timeline');
  var days = Object.keys(records).map(Number).sort(function (a, b) { return b - a; });
  days.forEach(function (d) {
    var r = records[d];
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'item';
    btn.innerHTML =
      '<span class="date ui"><span class="dd">' + d + '</span><br><span class="wd">' + r.wd + '요일</span></span>' +
      '<span><span class="rf ui">' + r.ref + '</span><br><span class="tt">' + r.title + '</span>' +
      '<p class="pv">' + r.qa[0].a.split('.')[0] + '.</p></span>';
    btn.addEventListener('click', function () { showDetail(r, '이날 나무에 열매가 맺혔어요 🍎'); });
    tl.appendChild(btn);
  });
})();
</script>
</body>
</html>
